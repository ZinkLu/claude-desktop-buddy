[platformio]
default_envs = x-knob

[env:x-knob]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.filesystem = littlefs
board_build.partitions = partitions.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 7340032

; Task 0: only compile main.cpp. Subsequent tasks will expand this filter
; as they bring back / add modules. Other src/ files stay in the tree but
; are excluded from the build until their hw_* dependencies are ready.
build_src_filter = +<main.cpp> +<ble_bridge.cpp> +<hw_display.cpp> +<hw_power.cpp> +<hw_input.cpp> +<hw_motor.cpp> +<hw_leds.cpp> +<buddy.cpp> +<buddies/capybara.cpp> +<character.cpp> +<clock_face.cpp> +<input_fsm.cpp> +<menu_panels.cpp> +<pet_gesture.cpp> +<info_pages.cpp> +<pet_pages.cpp>

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    ; X-Knob has no USB-UART chip on UART0; route Arduino Serial to USB CDC
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; TFT_eSPI configuration for X-Knob GC9A01
    -DUSER_SETUP_LOADED=1
    -DGC9A01_DRIVER=1
    ; ESP32-S3 has no VSPI — force TFT_eSPI onto HSPI (SPI3)
    -DUSE_HSPI_PORT=1
    -DTFT_MISO=-1
    -DTFT_MOSI=11
    -DTFT_SCLK=12
    -DTFT_CS=10
    -DTFT_DC=14
    -DTFT_RST=9
    -DTFT_BL=-1
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=240
    -DSPI_FREQUENCY=40000000
    -DLOAD_GLCD=1
    -DLOAD_FONT2=1
    -DLOAD_FONT4=1
    -DSMOOTH_FONT=1

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    adafruit/Adafruit NeoPixel@^1.12.0
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0
    SPI
    Wire

[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17
build_src_filter = +<hw_input.cpp> +<clock_face.cpp> +<input_fsm.cpp> +<pet_gesture.cpp>
test_build_src = yes
