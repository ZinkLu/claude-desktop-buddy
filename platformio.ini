[platformio]
default_envs = x-knob

[env:x-knob]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
upload_speed = 921600

board_build.filesystem = littlefs
board_build.partitions = partitions.csv
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 7340032

build_src_filter = +<main.cpp> +<ble_bridge.cpp> +<hw_display.cpp> +<hw_power.cpp> +<hw_input.cpp> +<hw_motor_foc.cpp> +<hw_leds.cpp> +<buddy.cpp> +<buddies/*.cpp> +<character.cpp> +<clock_face.cpp> +<input_fsm.cpp> +<menu_panels.cpp> +<pet_gesture.cpp> +<info_pages.cpp> +<pet_pages.cpp> +<hw_idle.cpp> +<font_cjk.cpp>

build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps =
    moononournation/GFX Library for Arduino@1.2.1
    askuric/Simple FOC@2.2.3
    adafruit/Adafruit NeoPixel@^1.12.0
    bitbank2/AnimatedGIF @ ^2.1.1
    bblanchon/ArduinoJson @ ^7.0.0
    SPI
    Wire

[env:native]
platform = native
test_framework = unity
build_flags = -std=gnu++17
build_src_filter = +<hw_input.cpp> +<clock_face.cpp> +<input_fsm.cpp> +<pet_gesture.cpp>
test_build_src = yes
